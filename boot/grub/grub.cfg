# Shlte OS GRUB Configuration
# Minimal configuration for ARM64 virt machine

set timeout=5
set default=0

menuentry "Shlte OS" {
    search --set=root --file /boot/kernel.img
    linux /boot/kernel.img root=/dev/vda console=ttyAMA0
}

menuentry "Shlte OS (Debug)" {
    search --set=root --file /boot/kernel.img
    linux /boot/kernel.img root=/dev/vda console=ttyAMA0 debug=1
}

menuentry "Shlte OS (Reboot)" {
    search --set=root --file /boot/kernel.img
    linux /boot/kernel.img root=/dev/vda reboot=true
}
