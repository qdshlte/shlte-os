# Shlte OS GRUB Configuration
# Supports both ARM64 and x86_64

set timeout=5
set default=0

menuentry "Shlte OS" {
    search --set=root --file /boot/kernel.bin
    linux /boot/kernel.bin root=/dev/vda
}

menuentry "Shlte OS (Debug)" {
    search --set=root --file /boot/kernel.bin
    linux /boot/kernel.bin root=/dev/vda debug=1
}

menuentry "Shlte OS (Safe Mode)" {
    search --set=root --file /boot/kernel.bin
    linux /boot/kernel.bin root=/dev/vda safe=1
}
